<!DOCTYPE html>
<html>
<head>
  <style>
@font-face{
  font-family: 'DS-Digital';
  src: url('DS-DIGIB.ttf')
}
    body {
      background-image: url('WiiBackground.png');
      background-repeat: repeat;
      background-size: 80%;
      cursor: url(cursor1.png), auto;
    }

    #bottom-border {
      width: 100%;
      display: block;
      z-index: 1;
    }

footer{
  position: fixed;
    bottom: 0;
  left: 0;
  width: 100%;
}

    #clock{
      position: absolute;
      top: 5%;
      left: 42.7%;
      font-size: 5.2vw;
      font-family: 'DS-Digital';
      color: #8e8f8b;
    }
    #date{
      position: absolute;
      top: 49%;
      left: 42.5%;
      font-size: 3.3vw;
      font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
      font-weight:1000;
      color: #74747a;
      z-index: 2;
    }
    #MiiPhoto{
      position: absolute;
      width: 23vw;
      top: -32%;
      left: 61.8%;
      z-index: 3;
    }
#RinzeButton {
        position: absolute;
      width: 10vw;
      top: 15%;
      left: 4%;
      z-index: 3;
      background: none;
      border: none;
      cursor: url(cursor1.png), auto;
}

#RinzeButton img {
  width: 9.5vw;
  transition: transform .2s;
}

#RinzeButton:hover img {
  transform: scale(1.05);
}
.container{
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(3, 1fr);
  column-gap: 1%;
  row-gap: 2.5%;
  left: 2.1%;
  width: 85vw;
  height: 63.4vh;
  margin: 6vh auto 0 auto;
  position: relative;
}
    .cell{
      background-color: #dfdfdf;
      border: 4px solid #979797;
      border-radius: 20px;     
      background-position: center;
      transition: transform .2s;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .cell-img{
      transform: scale(1.5);
    }
    .cell-1{
      background-image: url("MonkeyBackground.png");
    }
    .cell:hover{
      transform: scale(1.05);
    }
.popup{
    position: absolute;
    top: 16%;
    left: 26%;
    margin-top: -50px;
    margin-left: -50px;
    width: 1000px;
    height: 700px;
      background-color: #f1f1f1;
      border: 4px solid #51bbda;
      border-radius: 20px;     
      background-position: center;
      z-index: 4;
      
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events:none;
      background-image: url(popupBackground.png);      
}
.backbutton{
    position: absolute;
    top: 93%;
    left: 26%;
    margin-top: -50px;
    margin-left: -50px;
    width: 400px;
    height: 60px;
      background-color: #ffffff;
      border: 4px solid #51bbda;
      border-radius: 50px;     
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 200%;
      font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
      color: #74747a;
      background-image: url("ButtonBackground.png");
      background-size: 100%;
      cursor: url(cursor1.png), auto;
      transition: transform .2s;
}
.backbutton:hover{
  transform: scale(1.05);
}
.open-popup{
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.close-popup{
    opacity: 0;
  transform: translateY(20px);
  pointer-events: none;
}

.borders{
  border-radius: 10px;
}

  </style>
</head>
<body>
  
  <div class="container">
    <div class="cell cell-1">
      <img src="MonkeyLogo.png" class="cell-img">
    </div>
    <div class ="cell cell-2">2.</div>
    <div class ="cell cell-3">3.</div>
    <div class ="cell cell-4">4.</div>
    <div class ="cell cell-5">5.</div>
    <div class ="cell cell-6">6.</div>
    <div class ="cell cell-7">7.</div>
    <div class ="cell cell-8">8.</div>
    <div class ="cell cell-9">9.</div>
    <div class ="cell cell-10">10.</div>
    <div class ="cell cell-11">11.</div>
    <div class ="cell cell-12">12.</div>
  </div>
  
  
  <div class ="popup">
    <button id="backButton" onclick="closePopup()">
      <div class="backbutton">Back</div>
    </button>
  </div>
  
<footer id="bottom-ui">

    <img id="bottom-border" src="WiiBorder.png" />
    
    <div id="clock">67:67 pm</div>
    <div id="date">Tue 67/67</div>
    <button id="RinzeButton" onclick="openPopup()">
    <img src="RinzeButton.png"/>
  </button>

  <img id="MiiPhoto" src="MiiRender.png"/>
</footer>

<audio autoplay loop>
    <source src="Mii Editor - Mii Maker (Wii U) Music.mp3" type="audio/mpeg">
</audio>

</body>
</html>

<script>
  let popup = document.querySelector(".popup");

  function openPopup(){
    popup.classList.remove("close-popup");
popup.classList.add("open-popup");
  }

  function closePopup(){
    popup.classList.remove("open-popup");
    popup.classList.add("close-popup");
  }

  //window.addEventListener("load", () => {openPopup();});
</script>
