<!DOCTYPE html>
<html>
<head>
  <style>
@font-face{
  font-family: 'DS-Digital';
  src: url('DS-DIGIB.ttf')
}
    body {
      background-image: url('WiiBackground.png');
      background-repeat: repeat;
      background-size: 80%;
      cursor: url(cursor.png), auto;
    }

    #bottom-border {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 1;
    }

    #clock{
      position: fixed;
      top: 730px;
      left: 940px;
      scale: 630%;
      font-family: 'DS-Digital';
      color: #8e8f8b;
    }
    #date{
      position: fixed;
      top: 840px;
      left: 920px;
      scale: 400%;
      font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
      font-weight:1000;
      color: #74747a;
      z-index: 2;
    }
.container{
  position: fixed;
  top: 60px;
  left: 180px;
  display: grid;
  grid-template-columns: repeat(4, 385px);
  grid-template-rows: repeat(3, 190px);
  gap: 15px;

}
    .cell{
      background-color: #dfdfdf;
      border-color: #979797;
      border-width: thick;
      border-radius: 20px;     
    }

    

    .cell-1{
      background-image: url('MonkeyBackground.png');
    }

  </style>
</head>
<body>
<div id="clock">12:00 pm</div>
<div id="date">Tue 06/04</div>

<div class="container">
  <div class ="cell cell-1">1.</div>
  <div class ="cell cell-2">2.</div>
  <div class ="cell cell-3">3.</div>
  <div class ="cell cell-4">4.</div>
  <div class ="cell cell-5">5.</div>
  <div class ="cell cell-6">6.</div>
  <div class ="cell cell-7">7.</div>
  <div class ="cell cell-8">8.</div>
  <div class ="cell cell-9">9.</div>
  <div class ="cell cell-10">10.</div>
  <div class ="cell cell-11">11.</div>
    <div class ="cell cell-12">12.</div>
  </div>
  
  <img id="bottom-border" src="WiiBorder.png" />
</body>
</html>
